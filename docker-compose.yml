services:
  # ===========================================
  # LARAVEL APP (Brain - Queue Producer)
  # ===========================================
  laravel:
    build:
      context: ./laravel/docker/app
      dockerfile: Dockerfile
    image: univision-laravel
    container_name: univision-laravel
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    env_file:
      - ./laravel/.env
    environment:
      - MEDIAMTX_HOST=mediamtx
      - YOLO_REALTIME_URL=http://yolo-realtime:8000
    networks:
      - univision-network
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_healthy

  # ===========================================
  # NGINX (Web Server)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: univision-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./laravel:/var/www/html:ro
      - ./laravel/docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./laravel/docker/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    environment:
      MEDIAMTX_VIEWER_AUTH: ${MEDIAMTX_VIEWER_AUTH}
    entrypoint: ["/docker-entrypoint.sh"]
    networks:
      - univision-network
    depends_on:
      laravel:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # CERTBOT (Let's Encrypt SSL)
  # ===========================================
  certbot:
    image: certbot/certbot
    container_name: univision-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ===========================================
  # YOLO Worker (People Counter - Queue Consumer)
  # ===========================================
  yolo:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    image: univision-yolo
    container_name: univision-yolo
    restart: unless-stopped
    volumes:
      - ./fastapi:/app
      - ./laravel/storage/app/public/snapshots:/var/www/html/storage/app/public/snapshots:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - YOLO_CONFIDENCE=0.3
      - YOLO_MODEL=yolov8n.pt
    networks:
      - univision-network
    depends_on:
      redis:
        condition: service_healthy

  # ===========================================
  # YOLO Realtime (High-Accuracy Manual Counter)
  # ===========================================
  yolo-realtime:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    image: univision-yolo
    container_name: univision-yolo-realtime
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./fastapi:/app
      - ./laravel/storage/app/public/snapshots:/var/www/html/storage/app/public/snapshots:ro
    environment:
      - YOLO_CONFIDENCE=0.25
      - YOLO_MODEL=yolov8x.pt
      - SNAPSHOT_ROOT=/var/www/html/storage/app/public/snapshots
    networks:
      - univision-network

  # ===========================================
  # MEDIAMTX (RTSP/HLS Streaming Server)
  # ===========================================
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: univision-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554" # RTSP
      - "1935:1935" # RTMP
      - "8888:8888" # HLS
      - "8889:8889" # WebRTC signaling
      - "8189:8189/udp" # WebRTC media (UDP)
      - "8189:8189/tcp" # WebRTC media (TCP fallback)
      - "9997:9997" # API
    volumes:
      - ./laravel/mediamtx.yml.template:/mediamtx.yml.template:ro
      - ./laravel/docker/mediamtx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    environment:
      MEDIAMTX_ADMIN_USER: ${MEDIAMTX_USER:-admin}
      MEDIAMTX_ADMIN_PASSWORD: ${MEDIAMTX_PASSWORD}
      MEDIAMTX_VIEWER_USER: ${MEDIAMTX_VIEWER_USER:-viewer}
      MEDIAMTX_VIEWER_PASSWORD: ${MEDIAMTX_VIEWER_PASSWORD}
      MEDIAMTX_PUBLIC_IP: ${MEDIAMTX_PUBLIC_IP:-127.0.0.1}
      MEDIAMTX_INTERNAL_IP: ${MEDIAMTX_INTERNAL_IP:-127.0.0.1}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
    entrypoint: ["/docker-entrypoint.sh"]
    networks:
      - univision-network
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 8554 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # REDIS (Shared Queue - Laravel <-> FastAPI)
  # ===========================================
  redis:
    image: redis:alpine
    container_name: univision-redis
    restart: unless-stopped
    # ports not exposed to host — only accessible within Docker network
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - univision-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================================
  # POSTGRESQL (Shared Database)
  # ===========================================
  pgsql:
    image: postgres:17-alpine
    container_name: univision-pgsql
    restart: unless-stopped
    # ports not exposed to host — only accessible within Docker network
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - univision-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-laravel}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ===========================================
# SHARED NETWORK
# ===========================================
networks:
  univision-network:
    driver: bridge

# ===========================================
# PERSISTENT VOLUMES
# ===========================================
volumes:
  redis-data:
    driver: local
  pgsql-data:
    driver: local
